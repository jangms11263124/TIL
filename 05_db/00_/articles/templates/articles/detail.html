{% extends "base.html" %}

{% block content %}
  <div>
    <p> {{ article.title }}</p>
    <p> {{ article.content }}</p>
    <p> {{ article.created_at }}</p>
    <p> {{ article.updated_at }}</p>
    <a href="{% url "articles:update" article.pk %}">게시글 수정</a>
    <form action="{% url "articles:delete" article.pk %}" method="POST">
      {% csrf_token %}
      <input type="submit" value="게시글 삭제">
    </form>
    <hr>
    <a href="{% url "articles:index" %}">홈으로</a>
  </div>
{% endblock content %}
