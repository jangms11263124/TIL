{% extends "base.html" %}

{% block content %}
  {% if request.user.is_authenticated %}
    {% for article in articles %}
      <div>
        <a href="{% url "articles:detail" article.pk %}"> {{ article.pk }}</a>
        <p> {{ article.title }}</p>
        <p> {{ article.content }}</p>
        <p> {{ article.created_at }}</p>
        <p> {{ article.updated_at }}</p>
        <hr>
      </div>
    {% endfor %}
  {% endif %}
{% endblock content %}
