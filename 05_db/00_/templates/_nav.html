<nav>
  {% if request.user.is_authenticated %}
    <h1>{{ request.user.username }}님 안녕하세요</h1>
    <a href="{% url "articles:create" %}">글 쓰기</a>
    <form action="{% url "accounts:logout" %}" method="POST">
      {% csrf_token %}
      <input type="submit" value="로그아웃">
    </form> 
  {% else %}
    <h1>로그인 해주세요.</h1>
    <li><a href="{% url "accounts:login" %}">accounts: loing 로그인</a></li>
    <li><a href="{% url "accounts:signup" %}">accounts: signup 회원가입</a></li>
  {% endif %}
  
</nav>
